<div class="flex items-center justify-between w-full h-full px-2 text-xs select-none gap-2 font-mono text-slate-700">
  
  <!-- Left Side: Status Message -->
  <div class="flex-1 min-w-0 h-[22px] px-2 flex items-center gap-2 border border-t-slate-400 border-l-slate-400 border-r-white border-b-white bg-slate-100/50 rounded-sm">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-3.5 h-3.5 text-slate-400 shrink-0">
      <path fill-rule="evenodd" d="M18 10a8 8 0 1 1-16 0 8 8 0 0 1 16 0Zm-7-4a1 1 0 1 1-2 0 1 1 0 0 1 2 0ZM9 9a.75.75 0 0 0 0 1.5h.253a.25.25 0 0 1 .244.304l-.459 2.066A1.75 1.75 0 0 0 10.747 15H11a.75.75 0 0 0 0-1.5h-.253a.25.25 0 0 1-.244-.304l.459-2.066A1.75 1.75 0 0 0 9.253 9H9Z" clip-rule="evenodd" />
    </svg>
    <span class="truncate text-[11px] font-medium text-slate-600">{{ paintService.statusMessage() }}</span>
  </div>

  <!-- Center-Right: Cursor Coordinates -->
  <div class="w-36 shrink-0 h-[22px] px-2 flex items-center gap-2 border border-t-slate-400 border-l-slate-400 border-r-white border-b-white bg-slate-100/50 rounded-sm">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-3.5 h-3.5 text-slate-400">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v18m9-9H3" />
    </svg>
    <span class="text-[11px] font-medium text-slate-600">{{ paintService.cursorPosition().x }}, {{ paintService.cursorPosition().y }} px</span>
  </div>

  <!-- Right: Canvas Size -->
  <div class="w-36 shrink-0 h-[22px] px-2 flex items-center gap-2 border border-t-slate-400 border-l-slate-400 border-r-white border-b-white bg-slate-100/50 rounded-sm">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-3.5 h-3.5 text-slate-400">
      <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3.75v16.5h16.5V3.75H3.75ZM3 12h18M12 3v18" />
    </svg>
    <span class="text-[11px] font-medium text-slate-600">{{ paintService.canvasSize().width }} x {{ paintService.canvasSize().height }} px</span>
  </div>

  <!-- Zoom Control Widget -->
  <div class="w-60 shrink-0 h-[22px] px-1.5 flex items-center justify-between border border-t-slate-400 border-l-slate-400 border-r-white border-b-white bg-slate-100/50 rounded-sm">
    <button 
      (click)="paintService.zoomOut()"
      class="w-[18px] h-[18px] flex items-center justify-center rounded-sm bg-slate-200 border border-slate-300 hover:bg-slate-300 hover:border-slate-400 active:bg-slate-400 active:border-slate-500 text-slate-700 transition-all cursor-pointer select-none"
      title="Zoom arrière"
      type="button">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor" class="w-2.5 h-2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 12h-15" />
      </svg>
    </button>
    
    <!-- Slider -->
    <input 
      id="zoom-slider"
      name="zoomLevel"
      type="range" 
      min="0.125" 
      max="8" 
      step="0.125" 
      [value]="paintService.zoomLevel()" 
      (input)="onZoomSliderChange($event)"
      class="flex-1 h-1 mx-2 bg-slate-300 rounded-lg appearance-none cursor-pointer accent-blue-600 hover:accent-blue-700" 
      title="Ajuster le zoom"
    />
    
    <button 
      (click)="paintService.zoomIn()"
      class="w-[18px] h-[18px] flex items-center justify-center rounded-sm bg-slate-200 border border-slate-300 hover:bg-slate-300 hover:border-slate-400 active:bg-slate-400 active:border-slate-500 text-slate-700 transition-all cursor-pointer select-none"
      title="Zoom avant"
      type="button">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor" class="w-2.5 h-2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
      </svg>
    </button>
    
    <div class="flex items-center gap-1.5 shrink-0 pl-1">
      <span class="w-[36px] text-[10px] font-bold text-slate-700 text-right select-none">
        {{ getZoomPercent() }}%
      </span>
      <button 
        (click)="paintService.resetZoom()"
        class="w-[18px] h-[18px] flex items-center justify-center rounded-sm bg-slate-200 border border-slate-300 hover:bg-slate-300 hover:text-blue-600 hover:border-slate-400 active:bg-slate-400 active:border-slate-500 text-slate-500 transition-all cursor-pointer select-none"
        title="Réinitialiser le zoom à 100% (Ctrl 0)"
        type="button">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-3 h-3">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
        </svg>
      </button>
    </div>
  </div>

  <!-- Far Right: Online/Offline Network Status -->
  <div class="w-28 shrink-0 h-[22px] px-2 flex items-center gap-2 border border-t-slate-400 border-l-slate-400 border-r-white border-b-white bg-slate-100/50 rounded-sm font-sans">
    @if (isOnline()) {
      <span class="relative flex h-2 w-2">
        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
        <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
      </span>
      <span class="text-[11px] font-semibold text-emerald-600">En ligne</span>
    } @else {
      <span class="relative flex h-2 w-2">
        <span class="relative inline-flex rounded-full h-2 w-2 bg-rose-500"></span>
      </span>
      <span class="text-[11px] font-semibold text-rose-600">Hors-ligne</span>
    }
  </div>

</div>
