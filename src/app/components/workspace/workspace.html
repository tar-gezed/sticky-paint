<!-- Scrollable centering viewport -->
<div class="min-w-full min-h-full flex p-12 relative">

  <!-- Centered canvas wrapper sheet -->
  <div class="relative m-auto bg-white shadow-[0_0_0_1px_#000000,0_10px_40px_rgba(0,0,0,0.4),0_0_20px_rgba(14,165,233,0.1)] border-2 border-t-slate-700 border-l-slate-700 border-r-slate-300 border-b-slate-300 rounded-none shrink-0 transition-[border-color,box-shadow] duration-300 hover:shadow-[0_0_0_1px_#0ea5e9,0_15px_50px_rgba(0,0,0,0.5),0_0_30px_rgba(14,165,233,0.35)] hover:border-sky-400"
       [style.width.px]="paintService.canvasSize().width * paintService.zoomLevel()"
       [style.height.px]="paintService.canvasSize().height * paintService.zoomLevel()"
       [class.cursor-pencil]="paintService.activeTool() === 'brush'"
       [class.cursor-eraser]="paintService.activeTool() === 'eraser'"
       [class.cursor-text-tool]="paintService.activeTool() === 'text'"
       [class.cursor-shape-tool]="isShapeTool(paintService.activeTool())">
    <canvas #canvasElement class="w-full h-full" style="image-rendering: pixelated; image-rendering: crisp-edges;"></canvas>

    <!-- Grid Overlay -->
    @if (paintService.gridEnabled()) {
      <div class="absolute inset-0 pointer-events-none z-10 pixel-grid"
           [style.background-size]="paintService.zoomLevel() + 'px ' + paintService.zoomLevel() + 'px'">
      </div>
    }

    <!-- CRT Screen Overlay -->
    @if (paintService.crtFilterEnabled()) {
      <div class="absolute inset-0 pointer-events-none z-30 crt-overlay"></div>
    }

    <!-- Canvas Resize Handles -->
    <!-- Right resize handle -->
    <div 
      (mousedown)="startResizeCanvas($event, 'right')"
      class="absolute top-1/2 -translate-y-1/2 -right-1.5 w-3 h-3 bg-blue-600 border border-white cursor-ew-resize z-20 hover:scale-125 transition-transform rounded-xs shadow"
      title="Redimensionner la largeur">
    </div>

    <!-- Bottom resize handle -->
    <div 
      (mousedown)="startResizeCanvas($event, 'bottom')"
      class="absolute left-1/2 -translate-x-1/2 -bottom-1.5 w-3 h-3 bg-blue-600 border border-white cursor-ns-resize z-20 hover:scale-125 transition-transform rounded-xs shadow"
      title="Redimensionner la hauteur">
    </div>

    <!-- Bottom-right resize handle -->
    <div 
      (mousedown)="startResizeCanvas($event, 'both')"
      class="absolute -right-1.5 -bottom-1.5 w-3.5 h-3.5 bg-blue-600 border border-white cursor-nwse-resize z-20 hover:scale-125 transition-transform rounded-xs shadow"
      title="Redimensionner la largeur et la hauteur">
    </div>
  </div>

</div>

<!-- Drag & Drop overlay with glassmorphism / blur effect -->
@if (isDragOver) {
  <div class="absolute inset-0 bg-blue-500/10 backdrop-blur-sm border-4 border-dashed border-blue-500/60 z-50 pointer-events-none flex flex-col items-center justify-center p-8 transition-all duration-300 animate-in fade-in">
    <div class="bg-white/95 text-slate-800 p-6 rounded-2xl shadow-2xl flex flex-col items-center gap-3 max-w-sm text-center transform scale-100 animate-in fade-in zoom-in-95 duration-200">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-blue-500 animate-bounce" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
      </svg>
      <h3 class="font-bold text-lg font-sans">Déposer l'image ici</h3>
      <p class="text-sm text-slate-500 font-sans">Ajoutez l'image instantanément à votre canevas StickyPaint</p>
    </div>
  </div>
}
